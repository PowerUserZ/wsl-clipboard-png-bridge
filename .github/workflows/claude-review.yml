name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    uses: PowerUserZ/.github/.github/workflows/claude-review.yml@e4cfe30ec8cef6dbf39fc91f27ee7914c7316b5e
    with:
      prompt: |
        Review this PR for correctness, security, and code quality.
        Pay extra attention to:
          - bash safety: quoting, `set -euo pipefail`, subshell vs command group,
            signal handling and trap scope
          - sentinel-based bashrc edits and any data-loss paths
          - env var validation: injection, 0/negative/decimal edge cases
          - process control: flock, pgrep, pkill specificity, race conditions
          - shellcheck gotchas (false positives allowed if justified inline)
        Post findings as a single review comment with severity tags
        (critical / high / medium / low / nit).
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
